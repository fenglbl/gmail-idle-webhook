<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gmail Webhook Admin</title>
<script src="vue.global.prod.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }
.container { max-width: 640px; margin: 0 auto; padding: 24px 16px; }
header { margin-bottom: 32px; }
header h1 { font-size: 20px; font-weight: 600; }
header .status { font-size: 13px; color: #666; margin-top: 4px; display: flex; align-items: center; gap: 6px; }
header .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
header .dot.on { background: #22c55e; }
header .dot.off { background: #ef4444; }
.card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #333; }
label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 4px; }
input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; transition: border-color .15s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.15); }
textarea { resize: vertical; font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace; font-size: 13px; line-height: 1.5; }
.row { display: grid; gap: 12px; }
.row-3 { grid-template-columns: 2fr 1fr 1fr; }
.field { margin-bottom: 12px; }
.btn { padding: 7px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
.btn-danger { background: #fee2e2; color: #dc2626; }
.btn-danger:hover { background: #fecaca; }
.btn-ghost { background: #f3f4f6; color: #374151; }
.btn-ghost:hover { background: #e5e7eb; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Webhook card */
.hook-card { background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 14px; margin-bottom: 12px; position: relative; }
.hook-card .hook-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.hook-card .hook-num { font-size: 12px; font-weight: 600; color: #999; width: 20px; }

.vars-ref { background: #f0f4ff; border-radius: 6px; padding: 10px 12px; font-size: 12px; color: #555; line-height: 1.8; margin-top: 12px; }
.vars-table { width: 100%; border-collapse: collapse; }
.vars-table td { padding: 3px 0; vertical-align: top; }
.vars-table code { background: #e0e7ff; padding: 1px 5px; border-radius: 3px; font-size: 12px; color: #4338ca; cursor: pointer; white-space: nowrap; }
.vars-table code:hover { background: #c7d2fe; }
.vars-desc { font-size: 12px; color: #777; padding-left: 8px; }
.vars-ref .vars-label { font-weight: 600; color: #666; margin-bottom: 4px; }

.template-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 99; animation: fadeInUp .2s ease; }
.toast.ok { background: #22c55e; color: #fff; }
.toast.err { background: #ef4444; color: #fff; }
@keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
</style>
</head>
<body>
<div id="app">
  <div class="container">
    <header>
      <h1>📧 Gmail Webhook</h1>
      <div class="status">
        <span class="dot" :class="status.connected ? 'on' : 'off'"></span>
        {{ status.connected ? '已连接' : status.running ? '连接中...' : '未启动' }}
        <span style="color:#aaa">·</span>
        IMAP IDLE + Webhook
      </div>
    </header>

    <!-- IMAP 配置 -->
    <div class="card">
      <h2>IMAP 账号</h2>
      <div class="field">
        <label>邮箱地址</label>
        <input v-model="form.imap.user" placeholder="you@gmail.com" />
      </div>
      <div class="field">
        <label>App Password</label>
        <input v-model="form.imap.password" type="password" placeholder="xxxx-xxxx-xxxx-xxxx" />
      </div>
      <div class="row row-3" style="margin-bottom:4px">
        <div class="field" style="margin-bottom:0">
          <label>Host</label>
          <input v-model="form.imap.host" />
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Port</label>
          <input v-model.number="form.imap.port" type="number" />
        </div>
        <div class="field" style="margin-bottom:0">
          <label>SSL</label>
          <select v-model="form.imap.secure">
            <option :value="true">是</option>
            <option :value="false">否</option>
          </select>
        </div>
      </div>
      <div style="margin-top:14px">
        <button class="btn btn-primary" :disabled="saving" @click="saveImap">
          {{ saving ? '保存中...' : '保存并重启' }}
        </button>
      </div>
    </div>

    <!-- 代理配置 -->
    <div class="card">
      <h2>代理（可选）</h2>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <label style="margin:0;cursor:pointer">
          <input type="checkbox" v-model="form.proxy.enabled" style="width:auto;margin-right:4px" @change="saveProxy" />
          启用代理
        </label>
      </div>
      <div v-if="form.proxy.enabled">
        <div class="row row-3" style="margin-bottom:4px">
          <div class="field" style="margin-bottom:0">
            <label>类型</label>
            <select v-model="form.proxy.type" @change="saveProxy">
              <option value="socks5">SOCKS5</option>
              <option value="socks4">SOCKS4</option>
              <option value="http">HTTP</option>
            </select>
          </div>
          <div class="field" style="margin-bottom:0">
            <label>Host</label>
            <input v-model="form.proxy.host" placeholder="127.0.0.1" @blur="saveProxy" />
          </div>
          <div class="field" style="margin-bottom:0">
            <label>Port</label>
            <input v-model.number="form.proxy.port" type="number" placeholder="1080" @blur="saveProxy" />
          </div>
        </div>
        <div class="row row-2" style="margin-bottom:0">
          <div class="field" style="margin-bottom:0">
            <label>用户名（可选）</label>
            <input v-model="form.proxy.user" @blur="saveProxy" />
          </div>
          <div class="field" style="margin-bottom:0">
            <label>密码（可选）</label>
            <input v-model="form.proxy.pass" type="password" @blur="saveProxy" />
          </div>
        </div>
      </div>
    </div>

    <!-- Webhooks -->
    <div class="card">
      <h2>Webhooks</h2>

      <div v-for="(w, i) in form.webhooks" :key="i" class="hook-card">
        <div class="hook-header">
          <span class="hook-num">#{{ i + 1 }}</span>
          <input v-model="w.url" placeholder="https://your-webhook.com/endpoint" style="flex:1" @blur="updateHook(i, w)" />
          <button class="btn btn-ghost btn-sm" @click="testHook(i)" :disabled="w._testing">{{ w._testing ? '测试中...' : '测试' }}</button>
          <button class="btn btn-danger btn-sm" @click="removeHook(i)">删除</button>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Payload 模板 <span style="color:#aaa;font-weight:400">（留空 = 默认 JSON）</span></label>
          <textarea v-model="w.template" :rows="templateRows(w.template)" placeholder='{"text":"{{subject}} - {{from}}"}' @blur="updateHook(i, w)"></textarea>
        </div>
      </div>

      <p v-if="!form.webhooks.length" style="font-size:13px;color:#999;margin-bottom:12px">暂无 webhook</p>

      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-ghost" @click="addHook">+ 添加 Webhook</button>
      </div>

      <!-- 变量参考 -->
      <div class="vars-ref">
        <div class="vars-label">可用变量</div>
        <table class="vars-table">
          <tr v-for="v in varsList" :key="v.k">
            <td><code @click="copyVar(v.k)">{{ v.label }}</code></td>
            <td class="vars-desc">{{ v.d }}</td>
          </tr>
        </table>
        <div class="template-presets">
          <button class="btn btn-ghost btn-sm" @click="applyPreset('json')">预设: JSON</button>
          <button class="btn btn-ghost btn-sm" @click="applyPreset('text')">预设: 纯文本</button>
          <button class="btn btn-ghost btn-sm" @click="applyPreset('form')">预设: 表单格式</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" :class="toast.type" v-if="toast.show">{{ toast.msg }}</div>
</div>

<script>
const API = window.location.pathname.replace(/\/admin\/?.*$/, '') || '';
const { createApp, ref, reactive, onMounted } = Vue;

createApp({
  setup() {
    const status = reactive({ running: false, connected: false });
    const form = reactive({
      imap: { host: 'imap.gmail.com', port: 993, secure: true, user: '', password: '' },
      proxy: { enabled: false, type: 'socks5', host: '', port: 1080, user: '', pass: '' },
      webhooks: [],
    });
    const saving = ref(false);
    const toast = reactive({ show: false, msg: '', type: 'ok' });
    const presetTarget = ref(-1);

    function notify(msg, type = 'ok') {
      toast.show = true; toast.msg = msg; toast.type = type;
      setTimeout(() => toast.show = false, 2500);
    }

    async function loadStatus() {
      try { const r = await fetch(API + '/health'); Object.assign(status, (await r.json()).watcher); } catch {}
    }

    async function loadConfig() {
      try {
        const d = await (await fetch(API + '/config')).json();
        if (d.imap) Object.assign(form.imap, d.imap);
        if (d.proxy) Object.assign(form.proxy, d.proxy);
        if (d.webhooks) form.webhooks = d.webhooks.map(w => ({ url: w.url, headers: w.headers || {}, template: w.template || '' }));
      } catch {}
    }

    let proxyTimer = null;
    async function saveProxy() {
      clearTimeout(proxyTimer);
      proxyTimer = setTimeout(async () => {
        try {
          const d = await (await fetch(API + '/config', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ proxy: form.proxy }),
          })).json();
          if (d.ok) notify('代理已保存');
        } catch { notify('保存失败', 'err'); }
      }, 500);
    }

    async function saveImap() {
      saving.value = true;
      try {
        const d = await (await fetch(API + '/config', {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imap: form.imap }),
        })).json();
        if (d.ok) { notify('已保存，watcher 重启中...'); setTimeout(loadStatus, 2000); }
        else notify('保存失败', 'err');
      } catch { notify('请求失败', 'err'); }
      saving.value = false;
    }

    async function addHook() {
      // 先保存当前所有 webhooks（确保 url/template 同步）
      // 然后添加一个新的空 webhook
      try {
        const r = await fetch(API + '/webhooks', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: '', template: '' }),
        });
        const d = await r.json();
        if (d.ok) {
          form.webhooks = d.webhooks.map(w => ({ url: w.url, headers: w.headers || {}, template: w.template || '' }));
          notify('已添加');
        }
      } catch { notify('添加失败', 'err'); }
    }

    async function updateHook(i, w) {
      try {
        const r = await fetch(API + '/webhooks/' + i, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(w),
        });
        const d = await r.json();
        if (d.ok) {
          form.webhooks = d.webhooks.map(h => ({ url: h.url, headers: h.headers || {}, template: h.template || '' }));
        }
      } catch {}
    }

    async function testHook(i) {
      const w = form.webhooks[i];
      if (!w.url) { notify('请先填写 URL', 'err'); return; }
      w._testing = true;
      try {
        const d = await (await fetch(API + '/webhooks/' + i + '/test', { method: 'POST' })).json();
        if (d.ok) {
          notify('测试成功 ✓ (' + d.status + ')');
        } else {
          notify('测试失败: ' + (d.error || d.status || '未知错误'), 'err');
        }
      } catch { notify('请求失败', 'err'); }
      w._testing = false;
    }

    async function removeHook(i) {
      try {
        const d = await (await fetch(API + '/webhooks/' + i, { method: 'DELETE' })).json();
        if (d.ok) {
          form.webhooks = d.webhooks.map(h => ({ url: h.url, headers: h.headers || {}, template: h.template || '' }));
          notify('已删除');
        }
      } catch { notify('删除失败', 'err'); }
    }

    function templateRows(t) {
      return Math.max(3, (t || '').split('\n').length + 1);
    }

    function copyVar(k) {
      const v = '{{' + k + '}}';
      const ta = document.createElement('textarea');
      ta.value = v; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      notify('已复制 ' + v);
    }

    const varsList = [
      { k: 'uid',        label: '{{uid}}',        d: '邮件 UID' },
      { k: 'from',       label: '{{from}}',       d: '发件人' },
      { k: 'to',         label: '{{to}}',         d: '收件人' },
      { k: 'subject',    label: '{{subject}}',    d: '邮件主题' },
      { k: 'date',       label: '{{date}}',       d: '发送时间（ISO 8601）' },
      { k: 'text',       label: '{{text}}',       d: '正文（纯文本，前5000字）' },
      { k: 'messageId',  label: '{{messageId}}',  d: 'Message-ID' },
      { k: 'html',       label: '{{html}}',       d: '是否有HTML正文（true/false）' },
    ];

    function applyPreset(type) {
      const presets = {
        json: JSON.stringify({ subject: '{{subject}}', from: '{{from}}', to: '{{to}}', date: '{{date}}', text: '{{text}}', uid: '{{uid}}' }, null, 2),
        text: '新邮件\n发件人: {{from}}\n主题: {{subject}}\n时间: {{date}}\n\n{{text}}',
        form: 'subject={{subject}}&from={{from}}&to={{to}}&date={{date}}&text={{text}}&uid={{uid}}',
      };
      // 应用到最后一个 webhook，或创建新的
      if (form.webhooks.length > 0) {
        const last = form.webhooks.length - 1;
        form.webhooks[last].template = presets[type];
        updateHook(last, form.webhooks[last]);
      }
    }

    onMounted(() => { loadConfig(); loadStatus(); setInterval(loadStatus, 10000); });

    return { status, form, saving, toast, varsList, saveImap, saveProxy, addHook, updateHook, testHook, removeHook, templateRows, copyVar, applyPreset };
  }
}).mount('#app');
</script>
</body>
</html>
